# ============================================
name: sen-frontend-prod

services:
  sen-frontend:
    build:
      context: ../..
      dockerfile: Docker/Production/Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
        - VITE_API_TIMEOUT=${VITE_API_TIMEOUT:-30000}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_TOKEN_KEY=${VITE_TOKEN_KEY:-sen_token}
        - VITE_USER_KEY=${VITE_USER_KEY:-sen_user}
    image: production-sen-frontend
    container_name: sen-frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - sen-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.sen.service=frontend"
      - "com.sen.environment=production"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  sen-network:
    external: true